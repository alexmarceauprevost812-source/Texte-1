<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Codex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="logo">🧠 Codex</div>
    </div>

    <div class="topbar-center">
      <span class="conv-title" id="convTitle">Nouvelle conversation</span>
    </div>

    <div class="topbar-right">

      <!-- MODE PERFORMANCE -->
      <button class="top-btn perf-btn" id="perfBtn" title="Mode Performance">
        <span class="perf-icon">⚡</span>
        <span id="perfLabel">Performance</span>
      </button>

      <!-- GITHUB -->
      <div class="top-btn-group">
        <button class="top-btn" id="githubBtn" aria-label="GitHub">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/></svg>
          <span id="githubLabel">GitHub</span>
        </button>
        <div class="dropdown" id="githubDropdown">
          <div class="dropdown-header">🐙 Connexion GitHub</div>
          <label>Token personnel (PAT)</label>
          <input type="password" id="githubToken" placeholder="ghp_..." autocomplete="off"/>
          <label>Repo cible</label>
          <input type="text" id="githubRepo" placeholder="user/mon-repo" autocomplete="off"/>
          <label>Branche (défaut: main)</label>
          <input type="text" id="githubBranch" placeholder="main" autocomplete="off"/>
          <button class="dropdown-save" id="githubSave">Connecter</button>
          <span class="connect-status" id="githubStatus"></span>
          <div class="dropdown-divider"></div>
          <a class="dropdown-link" href="https://github.com/settings/tokens/new?scopes=repo,read:user" target="_blank" rel="noopener noreferrer">→ Créer un token GitHub</a>
        </div>
      </div>

      <!-- SUPABASE -->
      <div class="top-btn-group">
        <button class="top-btn" id="supabaseBtn" aria-label="Supabase">
          <svg viewBox="0 0 109 113" fill="none" width="16" height="16"><path d="M63.7 110.3c-2.5 3.2-7.8 1.5-7.9-2.5L54.6 62H2.5c-3.6 0-5.5-4.3-3-6.8L45.3 2.7c2.5-3.2 7.8-1.5 7.9 2.5L54.4 51h52.1c3.6 0 5.5 4.3 3 6.8l-45.8 52.5z" fill="url(#spb)"/><defs><linearGradient id="spb" x1="109" y1="0" x2="0" y2="113" gradientUnits="userSpaceOnUse"><stop stop-color="#249361"/><stop offset="1" stop-color="#3ecf8e"/></linearGradient></defs></svg>
          <span id="supabaseLabel">Supabase</span>
        </button>
        <div class="dropdown" id="supabaseDropdown">
          <div class="dropdown-header">⚡ Connexion Supabase</div>
          <label>URL du projet</label>
          <input type="text" id="supabaseUrl" placeholder="https://xxx.supabase.co" autocomplete="off"/>
          <label>Clé anonyme (anon key)</label>
          <input type="password" id="supabaseAnonKey" placeholder="eyJ..." autocomplete="off"/>
          <button class="dropdown-save" id="supabaseSave">Connecter</button>
          <span class="connect-status" id="supabaseStatus"></span>
          <div class="dropdown-divider"></div>
          <label>SQL — Créer la table</label>
          <pre class="sql-preview">CREATE TABLE codex_files (...);</pre>
          <button class="dropdown-save" id="copySqlBtn" style="background:var(--black4);border-color:var(--border2);color:var(--white3);">📋 Copier le SQL</button>
        </div>
      </div>

      <!-- API KEY -->
      <div class="top-btn-group">
        <button class="top-btn" id="apiBtn" aria-label="Clé API">
          <span>🔑</span>
          <span id="apiLabel">API</span>
        </button>
        <div class="dropdown" id="apiDropdown">
          <div class="dropdown-header">🔑 Clé OpenAI</div>
          <label>Clé API</label>
          <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off"/>
          <button class="dropdown-save" id="saveKeyBtn">Sauvegarder</button>
          <span class="connect-status" id="keyStatus"></span>
          <div class="dropdown-divider"></div>
          <a class="dropdown-link" href="https://platform.openai.com/api-keys" target="_blank" rel="noopener noreferrer">→ Obtenir une clé OpenAI</a>
        </div>
      </div>

      <!-- CLEAR -->
      <button class="clear-btn" id="clearBtn" title="Effacer la conversation">🗑</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newChatBtn">+ Nouvelle conversation</button>
    </div>
    <div class="conversations-list" id="conversationsList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main-layout" id="mainLayout">
    <div class="chat-panel" id="chatPanel">

      <!-- INDICATEUR PERF -->
      <div class="perf-indicator" id="perfIndicator">
        <span>⚡</span><span>Mode Performance actif — Réponses ultra-rapides</span>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-area">
        <div class="input-wrapper">
          <textarea
            id="chatInput"
            placeholder="Pose ta question ou décris ton projet..."
            rows="1"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button class="send-btn" id="sendBtn" aria-label="Envoyer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
              <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Entrée pour envoyer · Maj+Entrée pour nouvelle ligne</p>
      </div>
    </div>
  </main>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
